<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#7AE5E5" />
    <title>버블팝랩 · BubblePopLab</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body data-theme="bubble">
    <main id="app">
      <canvas id="scene"></canvas>
      <header class="hud">
        <div class="hud__brand">버블팝랩</div>
        <div class="hud__score">
          <span class="hud__score-label">POP</span>
          <span id="score" class="hud__score-value">0</span>
        </div>
      </header>
      <section class="hero" id="hero">
        <h1 class="hero__title">무한 뽁뽁이</h1>
        <p class="hero__subtitle">머리 비우고, 손가락만 움직이세요</p>
        <button id="startBtn" class="hero__cta">시작</button>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
